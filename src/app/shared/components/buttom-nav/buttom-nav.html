<!-- Barre de navigation flottante en bas, visible uniquement sur mobile -->
<div class="fixed bottom-4 left-4 right-4 z-50 md:hidden">
  <div class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 px-4 py-2 flex justify-around items-center">

    <!-- Lien Accueil -->
    <a routerLink="/" routerLinkActive="text-teal-600 dark:text-teal-400" class="flex flex-col items-center text-slate-500 dark:text-slate-400 hover:text-teal-600 dark:hover:text-teal-400 transition-colors py-1">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
      </svg>
      <span class="text-xs font-medium">{{ 'nav_home' | translate }}</span>
    </a>

    <!-- Lien Traitements -->
    <a routerLink="/treatments" routerLinkActive="text-teal-600 dark:text-teal-400" class="flex flex-col items-center text-slate-500 dark:text-slate-400 hover:text-teal-600 dark:hover:text-teal-400 transition-colors py-1">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0 1 18 18.75h-2.25m-7.5-10.5H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V18.75m-7.5-10.5h6.375c.621 0 1.125.504 1.125 1.125v9.375m-8.25-3 1.5 1.5 3-3.75" />
      </svg>
      <span class="text-xs font-medium">{{ 'nav_treatments' | translate }}</span>
    </a>

    <!-- Bouton central CTA (appel à l'action) -->
    <button (click)="openModal()" class="flex flex-col items-center text-white bg-teal-600 hover:bg-teal-700 rounded-full p-2 -mt-6 shadow-lg shadow-teal-500/30 transition-all hover:scale-105 active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 11.25v3.75a.75.75 0 0 1-.75.75h-3.75a.75.75 0 0 1-.75-.75v-3.75a.75.75 0 0 1 .75-.75h3.75a.75.75 0 0 1 .75.75ZM6.75 11.25v3.75a.75.75 0 0 1-.75.75H2.25a.75.75 0 0 1-.75-.75v-3.75a.75.75 0 0 1 .75-.75h3.75a.75.75 0 0 1 .75.75ZM21 6.75v3.75a.75.75 0 0 1-.75.75h-3.75a.75.75 0 0 1-.75-.75V6.75a.75.75 0 0 1 .75-.75h3.75a.75.75 0 0 1 .75.75ZM6.75 6.75v3.75a.75.75 0 0 1-.75.75H2.25a.75.75 0 0 1-.75-.75V6.75a.75.75 0 0 1 .75-.75h3.75a.75.75 0 0 1 .75.75Z" />
      </svg>
      <span class="text-[10px] font-bold">CTA</span>
    </button>

    <!-- Lien Contact -->
    <a routerLink="/contact" routerLinkActive="text-teal-600 dark:text-teal-400" class="flex flex-col items-center text-slate-500 dark:text-slate-400 hover:text-teal-600 dark:hover:text-teal-400 transition-colors py-1">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
      </svg>
      <span class="text-xs font-medium">{{ 'nav_contact' | translate }}</span>
    </a>

    <!-- Lien Profil / Portail -->
    <a routerLink="/professional" routerLinkActive="text-teal-600 dark:text-teal-400" class="flex flex-col items-center text-slate-500 dark:text-slate-400 hover:text-teal-600 dark:hover:text-teal-400 transition-colors py-1">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
      </svg>
      <span class="text-xs font-medium">{{ 'nav_professional' | translate }}</span>
    </a>
  </div>
</div>
